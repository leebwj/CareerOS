name: role-grabber

on:
  schedule:
    # 4×/day, every ~6h (01:23 / 07:23 / 13:23 / 19:23 UTC) — shrinks the window
    # where a currently-active Simplify listing sits between snapshots and is
    # transiently missing from the feed. 13:23 UTC stays ~9:23am ET.
    - cron: "23 1,7,13,19 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  grab:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Pull + build the sheet
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }} # Path A: scoped LLM rescue of "Other"@target roles (no-op if unset)
        run: node apps/role-grabber/grab.mjs
      - name: Commit if changed
        run: |
          git config user.name "role-grabber[bot]"
          git config user.email "role-grabber@users.noreply.github.com"
          git add apps/role-grabber/data apps/role-grabber/ROLES.md
          git diff --cached --quiet && echo "no changes" || (git commit -m "chore(roles): daily sheet update" && git push)
