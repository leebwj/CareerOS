<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>CareerOS · Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mona+Sans:wght@500;600;700;800&family=Geist+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --canvas:#0b0c0e; --card:#15171a; --card2:#1a1d21; --ink:#f4f5f7; --muted:#828c99;
    --faint:#545c66; --line:#23262b; --cobalt:#6f88cf; --cobalt-deep:#9aafe2;
    --green:#7fbf8e; --amber:#d9b36a; --red:#c97b7b;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--canvas); color:var(--ink); font-family:"Mona Sans",sans-serif; font-size:15px; }
  .mono { font-family:"Geist Mono",monospace; }
  a { color:var(--cobalt-deep); text-decoration:none; }
  a:hover { text-decoration:underline; }

  header { position:sticky; top:0; z-index:10; background:rgba(11,12,14,.94); backdrop-filter:blur(8px); border-bottom:1px solid var(--line); }
  .hrow { max-width:1280px; margin:0 auto; padding:14px 20px; display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
  .brand { font-weight:800; font-size:17px; letter-spacing:-.02em; }
  .brand span { color:var(--cobalt-deep); }
  .meta { font-family:"Geist Mono",monospace; font-size:11.5px; color:var(--faint); text-transform:uppercase; letter-spacing:.14em; }
  .statsbar { max-width:1280px; margin:0 auto; padding:0 20px 11px; display:flex; gap:16px; flex-wrap:wrap; font-family:"Geist Mono",monospace; font-size:12px; color:var(--muted); }
  .statsbar b { color:var(--ink); }
  .statsbar .stat-offer b { color:var(--green); }
  .statsbar .stat-due { color:var(--amber); }
  .statsbar .stat-int { color:var(--cobalt-deep); }
  .statsbar:empty { display:none; }
  /* group-by-company headers + interview-date field (tracker polish) */
  .cohead { font-family:"Geist Mono",monospace; font-size:13px; font-weight:600; color:var(--ink); padding:11px 4px 5px; margin-top:8px; border-bottom:1px solid var(--line); cursor:pointer; user-select:none; }
  .cohead:hover { color:var(--cobalt-deep); }
  .cohead .con { color:var(--faint); font-weight:400; margin-left:2px; }
  .idate { background:var(--card2); border:1px solid var(--line); border-radius:8px; color:var(--ink); font-family:"Geist Mono",monospace; font-size:11px; padding:4px 6px; }
  .idate:focus { border-color:var(--cobalt); outline:none; }
  .more { text-align:center; padding:16px 12px; font-family:"Geist Mono",monospace; font-size:12px; color:var(--faint); }
  .spacer { flex:1; }

  .tabs { display:flex; gap:6px; }
  .tab { font-family:"Geist Mono",monospace; font-size:12px; letter-spacing:.08em; text-transform:uppercase; padding:7px 13px; border-radius:999px; border:1px solid var(--line); color:var(--muted); background:transparent; cursor:pointer; }
  .tab:hover { color:var(--ink); border-color:var(--faint); }
  .tab.on { background:var(--cobalt); border-color:var(--cobalt); color:#0b0c0e; font-weight:700; }
  .tab .n { opacity:.75; }

  .controls { max-width:1280px; margin:0 auto; padding:12px 20px 4px; display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  input[type=search], select { background:var(--card); border:1px solid var(--line); color:var(--ink); border-radius:10px; padding:8px 12px; font-family:"Mona Sans",sans-serif; font-size:14px; outline:none; }
  input[type=search] { width:260px; }
  input[type=search]:focus, select:focus { border-color:var(--cobalt); }
  .chip { font-family:"Geist Mono",monospace; font-size:11.5px; letter-spacing:.06em; padding:6px 12px; border-radius:999px; border:1px solid var(--line); color:var(--muted); background:transparent; cursor:pointer; display:inline-flex; align-items:center; gap:7px; }
  .chip.on { border-color:var(--cobalt); color:var(--ink); background:rgba(111,136,207,.12); }
  .chip .dot { width:6px; height:6px; border-radius:50%; flex:none; opacity:.85; }
  .dot-fit { background:#e5c06a; } .dot-hot { background:#ff8a5c; } .dot-new { background:var(--green); } .dot-tgt { background:var(--cobalt-deep); }
  .chip.on .dot { opacity:1; }
  /* keep the four filter chips together so none orphans onto its own line */
  .chipgroup { display:flex; gap:6px; flex-wrap:wrap; }
  /* action toolbar — same pill shape as the filter chips; left-aligned so it
     lines up cleanly under the search box (no orphaned right-float) */
  .util { display:flex; gap:6px; flex-wrap:wrap; align-items:center; flex-basis:100%; margin-top:2px; }
  .util button { background:transparent; border:1px solid var(--line); color:var(--muted); border-radius:999px; padding:7px 12px; font-family:"Geist Mono",monospace; font-size:11.5px; letter-spacing:.06em; cursor:pointer; }
  .util button:hover { color:var(--ink); border-color:var(--faint); }
  #sync.on { color:var(--green); border-color:rgba(127,191,142,.5); }

  main { max-width:1280px; margin:0 auto; padding:10px 20px 80px; }
  .day { font-family:"Geist Mono",monospace; font-size:11.5px; color:var(--faint); text-transform:uppercase; letter-spacing:.16em; margin:22px 0 8px; display:flex; align-items:center; gap:10px; }
  .day::after { content:""; flex:1; height:1px; background:var(--line); }

  .row { display:grid; grid-template-columns: 1fr auto; gap:4px 16px; padding:12px 16px; border:1px solid var(--line); border-radius:14px; background:var(--card); margin-bottom:8px; align-items:center; }
  .row:hover { border-color:#2e333a; }
  .row.applied-row { opacity:.85; }
  .r-main { min-width:0; }
  .r-title { font-weight:700; font-size:15.5px; letter-spacing:-.01em; }
  .r-title a { color:var(--ink); }
  .r-title a:hover { color:var(--cobalt-deep); text-decoration:none; }
  .r-sub { margin-top:3px; font-size:13px; color:var(--muted); display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  .badge { font-family:"Geist Mono",monospace; font-size:10.5px; letter-spacing:.08em; text-transform:uppercase; padding:2px 8px; border-radius:999px; border:1px solid var(--line); color:var(--faint); }
  .badge.new { border-color:rgba(127,191,142,.5); color:var(--green); }
  .badge.tgt { border-color:rgba(217,179,106,.5); color:var(--amber); }
  .badge.cat { color:var(--cobalt-deep); border-color:rgba(111,136,207,.4); }
  .badge.term { color:var(--muted); border-color:var(--line); }
  .badge.hot { color:#ff8a5c; border-color:rgba(255,138,92,.55); background:rgba(255,138,92,.1); font-weight:700; }
  .badge.fit-s { color:#e5c06a; border-color:rgba(229,192,106,.5); }
  .badge.fit-g { color:var(--muted); border-color:var(--line); }
  .row.hot-row { border-color:rgba(255,138,92,.32); }
  .chip.hot.on { border-color:#ff8a5c; color:#ff8a5c; background:rgba(255,138,92,.12); }
  .r-actions { display:flex; gap:6px; align-items:center; }
  .act { border:1px solid var(--line); background:transparent; color:var(--muted); border-radius:9px; padding:7px 12px; font-size:13px; cursor:pointer; font-family:"Mona Sans",sans-serif; font-weight:600; white-space:nowrap; }
  .act:hover { color:var(--ink); border-color:var(--faint); }
  .act.primary { background:var(--cobalt); border-color:var(--cobalt); color:#0b0c0e; }
  .act.primary:hover { background:var(--cobalt-deep); color:#0b0c0e; }
  .act.star.on { color:var(--amber); border-color:rgba(217,179,106,.5); }
  .act.done { background:rgba(127,191,142,.15); border-color:rgba(127,191,142,.4); color:var(--green); }

  .st-select { background:var(--card2); border:1px solid var(--line); color:var(--ink); border-radius:8px; padding:6px 8px; font-size:13px; }
  .notes { width:100%; margin-top:8px; background:var(--card2); border:1px solid var(--line); border-radius:8px; color:var(--ink); padding:7px 10px; font-size:13px; font-family:"Mona Sans",sans-serif; display:none; }
  .row.open .notes { display:block; }

  .empty { text-align:center; color:var(--faint); padding:60px 0; font-size:14px; }
  .loading { text-align:center; color:var(--faint); padding:80px 0; font-family:"Geist Mono",monospace; font-size:12px; letter-spacing:.2em; text-transform:uppercase; }
  @media (max-width:720px) {
    .row { grid-template-columns:1fr; }
    .r-actions { justify-content:flex-end; }
    input[type=search] { width:100%; }
  }
</style>
</head>
<body>
<header>
  <div class="hrow">
    <div class="brand">CareerOS <span>Tracker</span><span style="color:var(--cobalt-deep)">.</span></div>
    <div class="meta" id="meta">loading…</div>
    <div class="spacer"></div>
    <nav class="tabs" id="tabs"></nav>
  </div>
  <div class="statsbar" id="stats"></div>
</header>

<div class="controls">
  <input type="search" id="q" placeholder="Search company or role…">
  <select id="cat"><option value="">All categories</option></select>
  <select id="lvl"><option value="">All levels</option><option value="intern">Intern</option><option value="new-grad">New grad</option><option value="full-time">Full-time</option></select>
  <select id="term"><option value="">All terms</option></select>
  <select id="sort"><option value="newest">Newest</option><option value="fit">Best fit</option><option value="followup">Follow-up due</option></select>
  <button class="chip" id="grp" title="Group roles under collapsible company headers">🏢 By company</button>
  <button class="chip" id="notif" title="Browser alert when a new 🔥 hot role appears">🔔 Alerts</button>
  <div class="chipgroup">
    <button class="chip" id="fFit"><i class="dot dot-fit"></i>Strong fit</button>
    <button class="chip" id="fHot"><i class="dot dot-hot"></i>Hot</button>
    <button class="chip" id="fNew"><i class="dot dot-new"></i>New</button>
    <button class="chip" id="fTgt"><i class="dot dot-tgt"></i>Targets</button>
  </div>
  <div class="util">
    <button id="undo" title="Undo last change (Ctrl+Z)" disabled>↶ Undo</button>
    <button id="sync" title="Live-sync your tracked roles to a Google Sheet">⧉ Sheet</button>
    <button id="csv" title="Download your tracked roles as a spreadsheet (opens in Excel/Sheets)">⬇ CSV</button>
    <button id="exp" title="Back up all tracker data as JSON">Export</button>
    <button id="imp" title="Restore tracker data from a JSON backup">Import</button>
  </div>
</div>

<main id="list"><div class="loading">Fetching today's roles</div></main>

<script>
(() => {
  const DATA_URL = "https://raw.githubusercontent.com/leebwj/CareerOS/main/apps/role-grabber/data/roles.json";
  // "target" is computed by the grabber (relevant role at a desirable company) → r.target
  const LS = "careeros-tracker-v1";
  const STAGES = ["Applied", "OA / Screen", "Interview", "Offer", "Rejected", "Ghosted"];

  const LS_BAK = LS + "-lastgood";
  let roles = [], state = { s: {}, hidden: {} }, view = "inbox", fNew = false, fTgt = false, fHot = false, fFit = false, fGroup = false;
  const collapsedCos = new Set(); // company headers collapsed in group-by-company view
  let notifOn = localStorage.getItem("careeros-notif") === "1"; // hot-role browser alerts
  const notified = new Set(JSON.parse(localStorage.getItem("careeros-notified") || "[]"));
  try { state = { s: {}, hidden: {}, ...JSON.parse(localStorage.getItem(LS) || "{}") } } catch {}
  // safety net: if the live tracker is empty but a backup holds tracked roles,
  // offer to restore (covers accidental wipes). Non-nagging: clears backup on decline.
  try {
    const bak = JSON.parse(localStorage.getItem(LS_BAK) || "{}");
    const nBak = Object.keys(bak.s || {}).length;
    if (!Object.keys(state.s || {}).length && nBak) {
      if (confirm(`CareerOS: found ${nBak} tracked role(s) from a local backup. Restore them?`)) {
        state = { s: {}, hidden: {}, ...bak };
        localStorage.setItem(LS, JSON.stringify(state));
      } else {
        localStorage.removeItem(LS_BAK);
      }
    }
  } catch {}
  // Guard against the #1 confusion: this tracker is only "yours" on leebrian.dev.
  // A local copy (127.0.0.1 / localhost / a file:// open / a preview URL) has its
  // OWN separate, empty browser storage — which is exactly what makes tracked
  // roles look like they reset to 0. Warn loudly so the two are never confused.
  if (location.hostname !== "leebrian.dev") {
    const bar = document.createElement("div");
    bar.style.cssText = "position:sticky;top:0;z-index:200;background:linear-gradient(#c2410c,#9a3412);color:#fff;font:600 13px/1.5 'Geist Mono',monospace;padding:9px 16px;text-align:center";
    bar.innerHTML = "⚠ This is a LOCAL copy — its data is separate and won't match your real tracker. Use <a href='https://leebrian.dev/tracker' style='color:#fff'>leebrian.dev/tracker</a> so every device stays in sync.";
    document.body.prepend(bar);
  }
  const save = () => {
    state.updated = Date.now(); // for last-write-wins across devices
    localStorage.setItem(LS, JSON.stringify(state));
    if (Object.keys(state.s || {}).length) localStorage.setItem(LS_BAK, JSON.stringify(state)); // rolling backup of last non-empty state
    syncToSheet();
  };

  // ── Google Sheet live sync (via a user-deployed Apps Script web app) ──
  const SYNC_HEAD = ["Company", "Role", "Category", "Level", "Term", "Location", "Status", "Applied", "Follow-up", "Notes", "Fit", "URL"];
  // Sync-URL persistence: kept in BOTH localStorage AND a 1-year first-party
  // cookie (belt & suspenders — some clears wipe one but not the other), plus an
  // optional bookmarkable #sync=<url>. Goal: connect ONCE, then plain
  // leebrian.dev/tracker stays connected — no re-pasting, no long URL.
  const setSyncCookie = (v) => { try { document.cookie = "careeros_sync=" + encodeURIComponent(v) + ";max-age=31536000;path=/;SameSite=Lax"; } catch {} };
  const getSyncCookie = () => { try { return decodeURIComponent((document.cookie.match(/(?:^|;\s*)careeros_sync=([^;]*)/) || [])[1] || ""); } catch { return ""; } };
  let syncUrl = localStorage.getItem("careeros-sync-url") || getSyncCookie() || "";
  try { const hs = new URLSearchParams(location.hash.slice(1)).get("sync"); if (hs) syncUrl = hs; } catch {}
  const saveSyncUrl = (u) => {
    syncUrl = u;
    if (u) { localStorage.setItem("careeros-sync-url", u); setSyncCookie(u); }
    else { localStorage.removeItem("careeros-sync-url"); setSyncCookie(""); }
  };
  if (syncUrl) saveSyncUrl(syncUrl); // re-persist to both stores on every load
  // a saved URL starts as "syncing" — NOT "synced" — until the load-time pull
  // actually reaches the sheet. Otherwise a dead/lost URL shows a false "Synced ✓"
  // over an empty tracker (the bug that made it look like data was gone).
  let syncTimer, syncState = syncUrl ? "syncing" : "off";
  // ── sync durability: remember the last VERIFIED push + alarm on silent failure ──
  const LS_OK = "careeros-sync-lastok";
  let lastSyncOk = +(localStorage.getItem(LS_OK) || 0);
  const markSyncOk = () => { lastSyncOk = Date.now(); try { localStorage.setItem(LS_OK, String(lastSyncOk)); } catch {} };
  function trackedRows() {
    const byKey = {}; roles.forEach((r) => (byKey[key(r)] = r));
    return Object.entries(state.s).map(([k, s]) => {
      const r = byKey[k] || {}; const [company, title, loc] = k.split("|");
      return [r.company || company, r.title || title, r.category || "", r.level || "", r.term || "",
        (r.locations && r.locations[0]) || loc || "", s.st || (s.star ? "Starred" : ""),
        s.date || "", s.fu || "", s.notes || "", r.fit ?? "", r.url || s.url || ""];
    });
  }
  function setSyncBtn() {
    const b = document.getElementById("sync"); if (!b) return;
    b.classList.toggle("on", syncState === "on" || syncState === "synced" || syncState === "syncing");
    b.textContent = syncState === "synced" ? "⧉ Synced ✓" : syncState === "syncing" ? "⧉ Syncing…" : syncState === "error" ? "⧉ Sync ✕" : "⧉ Sheet";
  }
  function doPush() {
    // NEVER overwrite the sheet with an empty state — a fresh/wiped browser must
    // not be able to blow away the durable backup. (The sheet is the source of
    // truth; clearing it is a deliberate manual act, not an automatic sync.)
    if (!Object.keys(state.s || {}).length) { syncState = "synced"; setSyncBtn(); return; }
    // form-encoded = the transport Apps Script reliably preserves through its 302
    // redirect (text/plain bodies get dropped). Pushes FULL state + readable rows.
    const pushedAt = state.updated || Date.now();
    fetch(syncUrl, { method: "POST", mode: "no-cors", headers: { "Content-Type": "application/x-www-form-urlencoded" }, body: "payload=" + encodeURIComponent(JSON.stringify({ state: JSON.stringify(state), rows: trackedRows() })) })
      .then(() => { syncState = "synced"; setSyncBtn(); setTimeout(() => verifySync(pushedAt), 3000); }) // no-cors can't read the reply → confirm it landed
      .catch(() => { syncState = "error"; setSyncBtn(); checkStale(); });
  }
  // verify-after-push: pull the sheet back and confirm our push actually landed.
  // If it didn't, the banner below trips — this is what would have caught the
  // week-long silent sync failure the day it happened.
  function verifySync(pushedAt) {
    if (!syncUrl) return;
    const fn = "__cosv_" + Date.now() + "_" + Math.floor(Math.random() * 1e6);
    const s = document.createElement("script");
    let fired = false;
    const fail = () => { syncState = "error"; setSyncBtn(); checkStale(); };
    const done = () => { if (fired) return; fired = true; try { delete window[fn]; } catch {} if (s.parentNode) s.parentNode.removeChild(s); };
    const timer = setTimeout(() => { fail(); done(); }, 9000);
    window[fn] = (payload) => {
      clearTimeout(timer);
      try {
        const remote = payload && payload.state ? JSON.parse(payload.state) : null;
        if (remote && (remote.updated || 0) >= (pushedAt || 0) - 2000) { markSyncOk(); syncState = "synced"; }
        else syncState = "error";
      } catch { syncState = "error"; }
      setSyncBtn(); checkStale(); done();
    };
    s.src = syncUrl + (syncUrl.includes("?") ? "&" : "?") + "callback=" + fn;
    s.onerror = () => { clearTimeout(timer); fail(); done(); };
    document.head.appendChild(s);
  }
  // loud staleness alarm — shows a red banner when you have tracked jobs but your
  // changes haven't reached the sheet (not connected · a sync error · a push that
  // didn't confirm). Actionable: Reconnect + Download backup. Stays silent when
  // everything's synced (a verified push keeps lastSyncOk ahead of your edits).
  let staleBar;
  function checkStale() {
    if (location.hostname !== "leebrian.dev") return; // the local-copy bar already covers non-prod
    const nJobs = Object.keys(state.s || {}).length;
    const unsynced = (state.updated || 0) > lastSyncOk + 3000 && Date.now() - (state.updated || 0) > 20000;
    const overdue = nJobs > 0 && (!syncUrl || syncState === "error" || unsynced);
    if (overdue) {
      if (!staleBar) {
        staleBar = document.createElement("div");
        staleBar.style.cssText = "position:sticky;top:0;z-index:201;background:linear-gradient(#b91c1c,#7f1d1d);color:#fff;font:600 13px/1.5 'Geist Mono',monospace;padding:9px 16px;text-align:center";
        document.body.prepend(staleBar);
        staleBar.addEventListener("click", (e) => {
          const a = e.target.closest("[data-act]"); if (!a) return; e.preventDefault();
          if (a.dataset.act === "reconnect") document.getElementById("sync").click();
          if (a.dataset.act === "backup") document.getElementById("exp").click();
        });
      }
      const reason = !syncUrl ? "NOT connected to your sheet" : syncState === "error" ? "the last sync FAILED" : "your latest changes haven't reached the sheet";
      staleBar.innerHTML = `⚠ ${nJobs} tracked job${nJobs > 1 ? "s" : ""} — ${reason}. <a href="#" data-act="reconnect" style="color:#fff;text-decoration:underline">Reconnect</a> · <a href="#" data-act="backup" style="color:#fff;text-decoration:underline">Download backup</a>`;
      staleBar.style.display = "";
    } else if (staleBar) staleBar.style.display = "none";
  }
  function syncToSheet(immediate) {
    if (!syncUrl) return;
    clearTimeout(syncTimer);
    syncState = "syncing"; setSyncBtn();
    if (immediate) doPush();
    else syncTimer = setTimeout(doPush, 1500);
  }
  // pull state from the sheet (JSONP — bypasses CORS on Apps Script GET); adopt
  // it only if it's NEWER than what we have and non-empty (never wipes local).
  // `after` fires once the pull settles (used to sequence pull→push on connect).
  function pullFromSheet(after) {
    if (!syncUrl) { if (after) after(); return; }
    const fn = "__cos_" + Date.now() + "_" + Math.floor(Math.random() * 1e6);
    const s = document.createElement("script");
    let fired = false;
    const done = () => { if (fired) return; fired = true; try { delete window[fn]; } catch {} if (s.parentNode) s.parentNode.removeChild(s); if (after) after(); };
    // A pull that never returns (dead/renamed deployment, blocked script, access
    // revoked) must NOT keep claiming "Synced" — flip to an honest error state and
    // trip the stale alarm so the false-green "Synced ✓ over empty" can't happen.
    const fail = () => { syncState = "error"; setSyncBtn(); checkStale(); done(); };
    const timer = setTimeout(fail, 9000);
    window[fn] = (payload) => {
      clearTimeout(timer);
      try {
        const remote = payload && payload.state ? JSON.parse(payload.state) : null;
        const remoteN = remote ? Object.keys(remote.s || {}).length : 0;
        const localN = Object.keys(state.s || {}).length;
        // MERGE, never last-write-wins. Wholesale replacement is how 33 tracked
        // jobs got clobbered by a fresh browser holding 1 newer job (2026-07-22):
        // guards caught EMPTY overwrites but not small-vs-big. Now: union both
        // sides' roles; for a key present in both, the globally-newer state's
        // entry wins. Nothing tracked on ANY device can be silently lost.
        // (Tradeoff: an untrack on one device can resurrect via another's stale
        // copy — acceptable; losing applications is not.)
        if (remoteN && (localN === 0 || (remote.updated || 0) > (state.updated || 0))) {
          // remote strictly newer (or local empty): adopt remote, then graft any
          // local-only keys back in (the 1-vs-33 case in both directions)
          const localOnly = Object.fromEntries(Object.entries(state.s || {}).filter(([k]) => !(remote.s || {})[k]));
          const hiddenU = { ...(state.hidden || {}), ...(remote.hidden || {}) };
          state = { s: { ...(remote.s || {}), ...localOnly }, hidden: hiddenU, updated: remote.updated || Date.now() };
          if (Object.keys(localOnly).length) { state.updated = Date.now(); syncToSheet(); } // union is newer than both → push it back
          localStorage.setItem(LS, JSON.stringify(state));
          if (Object.keys(state.s || {}).length) localStorage.setItem(LS_BAK, JSON.stringify(state));
          render();
        } else if (remoteN && localN) {
          // local is newer: keep local entries, but graft any remote-only keys
          // (another device's work must survive this device's next push)
          const remoteOnly = Object.fromEntries(Object.entries(remote.s || {}).filter(([k]) => !(state.s || {})[k]));
          if (Object.keys(remoteOnly).length || Object.keys(remote.hidden || {}).some((k) => !(state.hidden || {})[k])) {
            state = { s: { ...remoteOnly, ...state.s }, hidden: { ...(remote.hidden || {}), ...(state.hidden || {}) }, updated: Date.now() };
            localStorage.setItem(LS, JSON.stringify(state));
            localStorage.setItem(LS_BAK, JSON.stringify(state));
            render();
            syncToSheet(); // sheet lacks the union → push it back
          }
        }
        if (remote && (remote.updated || 0) >= (state.updated || 0)) markSyncOk(); // sheet already holds our latest → sync is healthy
        syncState = "synced"; setSyncBtn();   // the sheet actually responded → honestly synced
      } catch { syncState = "error"; setSyncBtn(); }
      checkStale();
      done();
    };
    s.src = syncUrl + (syncUrl.includes("?") ? "&" : "?") + "callback=" + fn;
    s.onerror = () => { clearTimeout(timer); fail(); };
    document.head.appendChild(s);
  }

  // undo — snapshot state before each change so accidental actions revert.
  // Call pushUndo() at the top of every mutating handler.
  let undoStack = [];
  const pushUndo = () => { undoStack.push(JSON.stringify(state)); if (undoStack.length > 40) undoStack.shift(); syncUndo(); };
  const syncUndo = () => { const b = document.getElementById("undo"); if (b) b.disabled = undoStack.length === 0; };
  const doUndo = () => { if (!undoStack.length) return; state = JSON.parse(undoStack.pop()); save(); render(); syncUndo(); };
  const key = (r) => (r.company + "|" + r.title + "|" + (r.locations[0] || "")).toLowerCase().replace(/\s+/g, " ");
  const esc = (s) => String(s ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  // follow-up cadence (research: email 7-14 days after applying, max 2 attempts)
  const addBizDays = (iso, n) => {
    const d = new Date(iso + "T12:00:00");
    while (n > 0) { d.setDate(d.getDate() + 1); if (d.getDay() !== 0 && d.getDay() !== 6) n--; }
    return d.toISOString().slice(0, 10);
  };
  const today = () => new Date().toISOString().slice(0, 10);

  const TABS = [
    ["inbox", "Inbox"], ["starred", "Starred"], ["applied", "Tracker"], ["hidden", "Hidden"],
  ];

  function counts() {
    const applied = Object.keys(state.s).length;
    const starred = roles.filter((r) => state.s[key(r)]?.star && !state.s[key(r)]?.st).length;
    const hidden = Object.keys(state.hidden).length;
    const inbox = roles.filter((r) => !state.s[key(r)]?.st && !state.hidden[key(r)]).length;
    return { inbox, starred, applied: roles.filter((r) => state.s[key(r)]?.st).length + orphanCount(), hidden };
  }
  // applied roles that fell out of the feed (closed postings) still show in Tracker
  function orphanCount() {
    const live = new Set(roles.map(key));
    return Object.entries(state.s).filter(([k, v]) => v.st && !live.has(k)).length;
  }

  function tabs() {
    const c = counts();
    document.getElementById("tabs").innerHTML = TABS.map(([id, label]) =>
      `<button class="tab ${view === id ? "on" : ""}" data-v="${id}">${label} <span class="n">${c[id] ?? ""}</span></button>`).join("");
    document.querySelectorAll(".tab").forEach((b) => b.onclick = () => { view = b.dataset.v; render(); });
  }

  function rowHTML(r, k, st) {
    const isNew = r.isNew, isTgt = r.target, isHot = r.hot;
    const s = st || {};
    const stageSel = `<select class="st-select" data-k="${esc(k)}">` +
      `<option value="">— stage —</option>` +
      STAGES.map((x) => `<option ${s.st === x ? "selected" : ""}>${x}</option>`).join("") + `</select>`;
    return `<div class="row ${s.st ? "applied-row" : ""} ${isHot ? "hot-row" : ""}" data-k="${esc(k)}">
      <div class="r-main">
        <div class="r-title"><a href="${esc(r.url)}" target="_blank" rel="noopener">${esc(r.company)} — ${esc(r.title)}</a></div>
        <div class="r-sub">
          ${r.fit >= 0.6 ? '<span class="badge fit-s" title="Strong fit">⭐</span>' : r.fit >= 0.48 ? '<span class="badge fit-g" title="Good fit">◐</span>' : ""}
          ${isHot ? '<span class="badge hot">🔥 hot</span>' : ""}
          ${isNew ? '<span class="badge new">new</span>' : ""}
          ${isTgt ? '<span class="badge tgt">target</span>' : ""}
          <span class="badge cat">${esc(r.category)}</span>
          ${r.term ? `<span class="badge term">${esc(r.term)}</span>` : ""}
          <span>${esc(r.locations[0] || "")}</span>
          <span class="mono" style="font-size:12px;color:var(--faint)">${esc(r.posted)} · ${esc(r.level)}</span>
          ${s.date ? `<span class="mono" style="font-size:12px;color:var(--green)">applied ${s.date}</span>` : ""}
          ${s.fu && s.st === "Applied" ? `<span class="mono" style="font-size:12px;color:${s.fu <= today() ? "var(--red)" : "var(--amber)"}">${s.fu <= today() ? "⏰ follow up now" : "follow-up " + s.fu}${s.fuN > 1 ? " (#2)" : ""}</span>` : ""}
          ${s.fuDone ? `<span class="mono" style="font-size:12px;color:var(--faint)">followed up ×${s.fuDone} — consider closing if silent</span>` : ""}
          ${s.idate ? `<span class="mono" style="font-size:12px;color:${s.idate >= today() ? "var(--cobalt-deep)" : "var(--faint)"}">📅 interview ${s.idate}</span>` : ""}
        </div>
        <input class="notes" data-k="${esc(k)}" placeholder="notes — contact, referral, follow-up…" value="${esc(s.notes || "")}">
      </div>
      <div class="r-actions">
        ${view === "applied" || s.st ? stageSel : `<a class="act primary" href="${esc(r.url)}" target="_blank" rel="noopener">Apply ↗</a>`}
        ${(s.st === "Interview" || s.st === "OA / Screen") ? `<input type="date" class="idate" data-k="${esc(k)}" value="${esc(s.idate || "")}" title="Interview / screen date">` : ""}
        ${s.fu && s.st === "Applied" && s.fu <= today() ? `<button class="act fu-done" data-k="${esc(k)}">✉ Followed up</button>` : ""}
        ${s.st ? "" : `<button class="act mark" data-k="${esc(k)}">✓ Applied</button>`}
        <button class="act star ${s.star ? "on" : ""}" data-k="${esc(k)}">★</button>
        <button class="act note-t" data-k="${esc(k)}">✎</button>
        ${view === "hidden" ? `<button class="act unhide" data-k="${esc(k)}">↩</button>` : s.st ? `<button class="act untrack" data-k="${esc(k)}" title="Remove from tracker">Untrack</button>` : `<button class="act hide" data-k="${esc(k)}">✕</button>`}
      </div>
    </div>`;
  }

  function renderStats() {
    const el = document.getElementById("stats"); if (!el) return;
    let applied = 0, prog = 0, offer = 0, week = 0, due = 0, interviews = 0;
    const weekAgo = new Date(Date.now() - 7 * 864e5).toISOString().slice(0, 10), td = today();
    for (const v of Object.values(state.s)) {
      if (v.st) applied++;
      if (v.st === "OA / Screen" || v.st === "Interview") prog++;
      if (v.st === "Offer") offer++;
      if (v.date && v.date >= weekAgo) week++;
      if (v.fu && v.st === "Applied" && v.fu <= td) due++;
      if (v.idate && v.idate >= td) interviews++;
    }
    el.innerHTML = applied === 0 ? "" :
      `<span><b>${applied}</b> applied</span><span><b>${prog}</b> in progress</span>` +
      (offer ? `<span class="stat-offer"><b>${offer}</b> offer${offer > 1 ? "s" : ""}</span>` : "") +
      `<span><b>${week}</b> this week</span>` +
      (interviews ? `<span class="stat-int">📅 <b>${interviews}</b> interview${interviews > 1 ? "s" : ""} upcoming</span>` : "") +
      (due ? `<span class="stat-due">⏰ <b>${due}</b> follow-up${due > 1 ? "s" : ""} due</span>` : "");
  }
  function render() {
    tabs();
    renderStats();
    const q = document.getElementById("q").value.toLowerCase();
    const cat = document.getElementById("cat").value;
    const lvl = document.getElementById("lvl").value;
    const term = document.getElementById("term").value;
    document.getElementById("fFit").classList.toggle("on", fFit);
    document.getElementById("fHot").classList.toggle("on", fHot);
    document.getElementById("fNew").classList.toggle("on", fNew);
    document.getElementById("fTgt").classList.toggle("on", fTgt);
    document.getElementById("grp").classList.toggle("on", fGroup);
    document.getElementById("notif").classList.toggle("on", notifOn);

    let rows = roles.filter((r) => {
      const k = key(r), s = state.s[k];
      if (view === "inbox" && (s?.st || state.hidden[k])) return false;
      if (view === "starred" && !s?.star) return false;
      if (view === "applied" && !s?.st) return false;
      if (view === "hidden" && !state.hidden[k]) return false;
      if (q && !(r.company + " " + r.title).toLowerCase().includes(q)) return false;
      if (cat && r.category !== cat) return false;
      if (lvl && r.level !== lvl) return false;
      if (term === "__none__") { if (r.term) return false; }
      else if (term && !(r.term || "").split(" / ").includes(term)) return false;
      if (fHot && !r.hot) return false;
      if (fFit && !(r.fit >= 0.6)) return false;
      if (fNew && !r.isNew) return false;
      if (fTgt && !r.target) return false;
      return true;
    });

    // sort (default newest; Tracker view defaults to overdue follow-ups first)
    const sortBy = document.getElementById("sort").value;
    if (sortBy === "fit") rows.sort((a, b) => (b.fit || 0) - (a.fit || 0));
    else if (sortBy === "followup" || view === "applied") rows.sort((a, b) => (state.s[key(a)]?.fu || "9999").localeCompare(state.s[key(b)]?.fu || "9999"));

    // PERF: cap rendered rows. 5,000+ DOM nodes made every click (Applied/star)
    // rebuild + re-wire the whole list → lag. Search/filters still reach every
    // role; this just tames the unfiltered firehose. Tracker view isn't capped.
    const totalRows = rows.length, ROW_LIMIT = 200;
    const capped = view !== "applied" && totalRows > ROW_LIMIT;
    if (capped) rows = rows.slice(0, ROW_LIMIT);

    // Tracker view keeps closed postings (fell out of the feed) visible
    let orphans = "";
    if (view === "applied") {
      const live = new Set(roles.map(key));
      orphans = Object.entries(state.s).filter(([k, v]) => v.st && !live.has(k)).map(([k, v]) => {
        const [company, title, loc] = k.split("|");
        return rowHTML({ company, title, locations: [loc], url: v.url || "#", category: "closed posting", posted: "", level: "", isNew: false }, k, v);
      }).join("");
    }

    const list = document.getElementById("list");
    if (!rows.length && !orphans) { list.innerHTML = `<div class="empty">Nothing here. ${view === "inbox" ? "All caught up 🎉" : ""}</div>`; return; }

    // group-by-company (if toggled) → date-grouped (inbox/newest) → flat
    let html = "";
    if (fGroup) {
      const cos = {};
      for (const r of rows) (cos[r.company] ||= []).push(r);
      for (const co of Object.keys(cos).sort((a, b) => cos[b].length - cos[a].length || a.localeCompare(b))) {
        const collapsed = collapsedCos.has(co);
        html += `<div class="cohead" data-co="${esc(co)}">${collapsed ? "▸" : "▾"} ${esc(co)} <span class="con">${cos[co].length}</span></div>`;
        if (!collapsed) html += cos[co].map((r) => rowHTML(r, key(r), state.s[key(r)])).join("");
      }
      html += orphans;
    } else if (view === "inbox" && sortBy === "newest") {
      const groups = {};
      for (const r of rows) (groups[r.posted] ||= []).push(r);
      for (const d of Object.keys(groups).sort().reverse()) {
        html += `<div class="day">${d}${groups[d].some((r) => r.isNew) ? " · has new" : ""}</div>`;
        html += groups[d].map((r) => rowHTML(r, key(r), state.s[key(r)])).join("");
      }
    } else {
      html = rows.map((r) => rowHTML(r, key(r), state.s[key(r)])).join("") + orphans;
    }
    if (capped) html += `<div class="more">Showing ${ROW_LIMIT} of ${totalRows.toLocaleString()} — search or use the filters to see the rest.</div>`;
    list.innerHTML = html;
    wire();
  }

  function wire() {
    document.querySelectorAll(".mark").forEach((b) => b.onclick = () => {
      pushUndo();
      const k = b.dataset.k;
      const r = roles.find((x) => key(x) === k);
      const d = today();
      state.s[k] = { ...(state.s[k] || {}), st: "Applied", date: d, url: r?.url, fu: addBizDays(d, 8), fuN: 1 };
      save(); render();
    });
    document.querySelectorAll(".fu-done").forEach((b) => b.onclick = () => {
      pushUndo();
      const k = b.dataset.k, s = state.s[k];
      s.fuDone = (s.fuDone || 0) + 1;
      if (s.fuDone >= 2) { delete s.fu; } // 2 attempts, then move on (research consensus)
      else { s.fu = addBizDays(today(), 5); s.fuN = 2; }
      save(); render();
    });
    document.querySelectorAll(".star").forEach((b) => b.onclick = () => {
      pushUndo();
      const k = b.dataset.k;
      state.s[k] = { ...(state.s[k] || {}), star: !state.s[k]?.star };
      if (!state.s[k].star && !state.s[k].st && !state.s[k].notes) delete state.s[k];
      save(); render();
    });
    document.querySelectorAll(".hide").forEach((b) => b.onclick = () => { pushUndo(); state.hidden[b.dataset.k] = 1; save(); render(); });
    document.querySelectorAll(".unhide").forEach((b) => b.onclick = () => { pushUndo(); delete state.hidden[b.dataset.k]; save(); render(); });
    // untrack: reset a role to untracked (accidental add / wrong click) — keeps a star/note if set
    document.querySelectorAll(".untrack").forEach((b) => b.onclick = () => {
      pushUndo();
      const k = b.dataset.k, s = state.s[k] || {};
      delete s.st; delete s.date; delete s.fu; delete s.fuN; delete s.fuDone;
      if (!s.star && !s.notes) delete state.s[k];
      save(); render();
    });
    document.querySelectorAll(".note-t").forEach((b) => b.onclick = () => b.closest(".row").classList.toggle("open"));
    document.querySelectorAll(".notes").forEach((n) => n.onchange = () => {
      pushUndo();
      state.s[n.dataset.k] = { ...(state.s[n.dataset.k] || {}), notes: n.value };
      save();
    });
    document.querySelectorAll(".st-select").forEach((s) => s.onchange = () => {
      pushUndo();
      const k = s.dataset.k;
      if (s.value) state.s[k] = { ...(state.s[k] || {}), st: s.value, date: state.s[k]?.date || new Date().toISOString().slice(0, 10) };
      else { delete state.s[k].st; delete state.s[k].idate; if (!state.s[k].star && !state.s[k].notes) delete state.s[k]; }
      save(); render();
    });
    document.querySelectorAll(".idate").forEach((n) => n.onchange = () => {
      pushUndo();
      state.s[n.dataset.k] = { ...(state.s[n.dataset.k] || {}), idate: n.value };
      save(); render();
    });
    document.querySelectorAll(".cohead").forEach((h) => h.onclick = () => {
      const co = h.dataset.co;
      collapsedCos.has(co) ? collapsedCos.delete(co) : collapsedCos.add(co);
      render();
    });
  }

  // controls
  ["q", "cat", "lvl", "term", "sort"].forEach((id) => document.getElementById(id).addEventListener("input", render));
  // Undo is button-only — no global Ctrl+Z (a reflex Ctrl+Z must never wipe tracked roles)
  document.getElementById("undo").onclick = doUndo;
  document.getElementById("fFit").onclick = () => { fFit = !fFit; render(); };
  document.getElementById("fHot").onclick = () => { fHot = !fHot; render(); };
  document.getElementById("fNew").onclick = () => { fNew = !fNew; render(); };
  document.getElementById("fTgt").onclick = () => { fTgt = !fTgt; render(); };
  document.getElementById("grp").onclick = () => { fGroup = !fGroup; render(); };
  document.getElementById("notif").onclick = async () => {
    if (!notifOn) {
      if (!("Notification" in window)) { alert("This browser doesn't support notifications."); return; }
      let perm = Notification.permission;
      if (perm !== "granted") perm = await Notification.requestPermission();
      if (perm !== "granted") { alert("Notifications are blocked — allow them for this site to get 🔥 hot-role alerts."); return; }
      notifOn = true; localStorage.setItem("careeros-notif", "1");
      roles.filter((r) => r.hot).forEach((r) => notified.add(key(r))); // seed → only alert on FUTURE new hot roles
      localStorage.setItem("careeros-notified", JSON.stringify([...notified]));
      new Notification("CareerOS alerts on 🔔", { body: "I'll ping you when a new 🔥 hot role drops." });
    } else {
      notifOn = false; localStorage.setItem("careeros-notif", "0");
    }
    render();
  };
  // fire a browser notification for hot roles we haven't alerted on yet
  function maybeNotifyHot() {
    if (!notifOn || !("Notification" in window) || Notification.permission !== "granted") return;
    const fresh = roles.filter((r) => r.hot && !notified.has(key(r)));
    if (!fresh.length) return;
    fresh.forEach((r) => notified.add(key(r)));
    localStorage.setItem("careeros-notified", JSON.stringify([...notified].slice(-800)));
    if (fresh.length === 1) new Notification("🔥 New hot role", { body: `${fresh[0].company} — ${fresh[0].title}` });
    else new Notification(`🔥 ${fresh.length} new hot roles`, { body: fresh.slice(0, 3).map((r) => r.company).join(", ") + (fresh.length > 3 ? "…" : "") });
  }
  document.getElementById("exp").onclick = () => {
    const blob = new Blob([JSON.stringify(state, null, 1)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "careeros-tracker-backup.json";
    a.click();
  };
  // spreadsheet export — every tracked/starred role, joined with its feed data
  document.getElementById("csv").onclick = () => {
    const rows = trackedRows();
    if (!rows.length) { alert("Nothing tracked yet — mark some roles Applied or ★ first."); return; }
    const csv = [SYNC_HEAD, ...rows].map((row) => row.map((c) => `"${String(c).replace(/"/g, '""')}"`).join(",")).join("\r\n");
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob(["﻿" + csv], { type: "text/csv;charset=utf-8" }));
    a.download = "careeros-applications.csv";
    a.click();
  };
  // JSONP connection test — confirms the deploy is reachable + doGet works
  function testConnection(cb) {
    if (!syncUrl) return cb(false);
    const fn = "__cost_" + Date.now() + "_" + Math.floor(Math.random() * 1e6);
    const s = document.createElement("script");
    const fin = (ok) => { try { delete window[fn]; } catch {} if (s.parentNode) s.parentNode.removeChild(s); cb(ok); };
    const timer = setTimeout(() => fin(false), 9000);
    window[fn] = (payload) => { clearTimeout(timer); fin(!!payload && typeof payload.state !== "undefined"); };
    s.src = syncUrl + (syncUrl.includes("?") ? "&" : "?") + "callback=" + fn;
    s.onerror = () => { clearTimeout(timer); fin(false); };
    document.head.appendChild(s);
  }
  // Inline connect panel — native prompt()/alert() are silently suppressed in
  // some browsers (this is exactly what left the tracker empty + unfixable), so
  // never use them here. Build the field in the DOM instead.
  document.getElementById("sync").onclick = () => {
    const existing = document.getElementById("syncPanel");
    if (existing) { existing.remove(); return; }   // toggle closed
    const panel = document.createElement("div");
    panel.id = "syncPanel";
    panel.style.cssText = "position:fixed;top:60px;right:14px;z-index:300;background:#15171c;border:1px solid rgba(255,255,255,.16);border-radius:11px;padding:15px;width:min(93vw,430px);box-shadow:0 14px 44px rgba(0,0,0,.55);font:13px/1.55 'Geist Mono',ui-monospace,monospace;color:#e9e9ee";
    panel.innerHTML =
      '<div style="font-weight:600;margin-bottom:6px">Google Sheet sync</div>' +
      '<div style="opacity:.72;margin-bottom:9px">Paste your Apps Script web-app URL (ends in <b>/exec</b>). Leave blank to turn sync OFF.</div>' +
      '<input id="syncInput" type="text" spellcheck="false" placeholder="https://script.google.com/macros/s/…/exec" style="width:100%;box-sizing:border-box;padding:9px;border-radius:7px;border:1px solid rgba(255,255,255,.22);background:rgba(0,0,0,.32);color:inherit;font:inherit;margin-bottom:9px">' +
      '<div id="syncMsg" style="min-height:34px;margin-bottom:9px;opacity:.92"></div>' +
      '<div style="display:flex;gap:8px;justify-content:flex-end">' +
      '<button id="syncCancel" style="padding:7px 13px;border-radius:7px;border:1px solid rgba(255,255,255,.2);background:transparent;color:inherit;font:inherit;cursor:pointer">Cancel</button>' +
      '<button id="syncGo" style="padding:7px 15px;border-radius:7px;border:0;background:#3b82f6;color:#fff;font:inherit;font-weight:600;cursor:pointer">Connect</button>' +
      '</div>';
    document.body.appendChild(panel);
    const input = panel.querySelector("#syncInput");
    const msg = panel.querySelector("#syncMsg");
    input.value = syncUrl || "";
    input.focus(); input.select();
    const close = () => panel.remove();
    panel.querySelector("#syncCancel").onclick = close;
    const go = () => {
      saveSyncUrl(input.value.trim()); // persists to localStorage + the 1-year cookie
      if (!syncUrl) { syncState = "off"; setSyncBtn(); close(); return; }
      syncState = "syncing"; setSyncBtn();
      msg.textContent = "Testing connection…";
      testConnection((ok) => {
        if (ok) {
          msg.textContent = "✓ Connected — loading your sheet…";
          // pull first (adopt newer remote), THEN push — a fresh device can't
          // overwrite a populated sheet with its empty state.
          pullFromSheet(() => { syncToSheet(true); setTimeout(close, 800); });
        } else {
          syncState = "error"; setSyncBtn();
          msg.innerHTML = "✕ Couldn't reach your sheet. Check: deployment <b>Who has access = Anyone</b>, URL ends in <b>/exec</b> (not /dev), the script has a <b>doGet</b>. Then redeploy a <b>New version</b> and paste the URL again.";
        }
      });
    };
    panel.querySelector("#syncGo").onclick = go;
    input.addEventListener("keydown", (e) => { if (e.key === "Enter") go(); if (e.key === "Escape") close(); });
  };
  setSyncBtn();
  document.getElementById("imp").onclick = () => {
    const inp = document.createElement("input");
    inp.type = "file"; inp.accept = ".json";
    inp.onchange = () => inp.files[0].text().then((t) => { state = { s: {}, hidden: {}, ...JSON.parse(t) }; save(); render(); });
    inp.click();
  };

  fetch(DATA_URL, { cache: "no-store" })
    .then((r) => r.json())
    .then((data) => {
      roles = data;
      const cats = [...new Set(roles.map((r) => r.category))].sort();
      document.getElementById("cat").innerHTML += cats.map((c) => `<option>${esc(c)}</option>`).join("");
      // terms, chronological (year then season); compound terms split apart
      const SEASON = { Spring: 0, Summer: 1, Fall: 2, Winter: 3 };
      const terms = [...new Set(roles.flatMap((r) => (r.term || "").split(" / ")).filter(Boolean))]
        .sort((a, b) => { const [sa, ya] = a.split(" "), [sb, yb] = b.split(" "); return (+ya - +yb) || (SEASON[sa] - SEASON[sb]); });
      document.getElementById("term").innerHTML += `<option value="__none__">No term listed</option>` + terms.map((t) => `<option>${esc(t)}</option>`).join("");
      const newest = roles.reduce((m, r) => (r.posted > m ? r.posted : m), "");
      document.getElementById("meta").textContent = `${roles.length} roles · data ${newest}`;
      render();
      maybeNotifyHot();           // alert on any hot roles new since last visit
      pullFromSheet();            // adopt newer state from the sheet (cross-device)
      checkStale();               // loud alarm if tracked jobs aren't reaching the sheet
    })
    .catch(() => { document.getElementById("list").innerHTML = `<div class="empty">Couldn't fetch roles.json — check connection.</div>`; });

  // re-fetch the roles feed (no select re-population) so new 🔥 hot roles can alert while the tab's open
  let lastRoles = Date.now();
  function refreshRoles() {
    lastRoles = Date.now();
    fetch(DATA_URL, { cache: "no-store" }).then((r) => r.json()).then((data) => {
      roles = data;
      document.getElementById("meta").textContent = `${roles.length} roles · data ${roles.reduce((m, r) => (r.posted > m ? r.posted : m), "")}`;
      render();
      maybeNotifyHot();
    }).catch(() => {});
  }

  // re-pull sheet on focus + every 60s; re-fetch roles on focus + every 20min
  let lastPull = 0;
  const maybePull = () => { if (syncUrl && Date.now() - lastPull > 12000) { lastPull = Date.now(); pullFromSheet(); } };
  window.addEventListener("focus", () => { maybePull(); if (Date.now() - lastRoles > 120000) refreshRoles(); });
  setInterval(() => { if (!document.hidden) { maybePull(); checkStale(); } }, 60000);
  setInterval(() => { if (!document.hidden) refreshRoles(); }, 20 * 60000);
})();
</script>
</body>
</html>
