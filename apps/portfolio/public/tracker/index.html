<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>CareerOS · Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Mona+Sans:wght@500;600;700;800&family=Geist+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --canvas:#0b0c0e; --card:#15171a; --card2:#1a1d21; --ink:#f4f5f7; --muted:#828c99;
    --faint:#545c66; --line:#23262b; --cobalt:#6f88cf; --cobalt-deep:#9aafe2;
    --green:#7fbf8e; --amber:#d9b36a; --red:#c97b7b;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--canvas); color:var(--ink); font-family:"Mona Sans",sans-serif; font-size:15px; }
  .mono { font-family:"Geist Mono",monospace; }
  a { color:var(--cobalt-deep); text-decoration:none; }
  a:hover { text-decoration:underline; }

  header { position:sticky; top:0; z-index:10; background:rgba(11,12,14,.94); backdrop-filter:blur(8px); border-bottom:1px solid var(--line); }
  .hrow { max-width:1280px; margin:0 auto; padding:14px 20px; display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
  .brand { font-weight:800; font-size:17px; letter-spacing:-.02em; }
  .brand span { color:var(--cobalt-deep); }
  .meta { font-family:"Geist Mono",monospace; font-size:11.5px; color:var(--faint); text-transform:uppercase; letter-spacing:.14em; }
  .statsbar { max-width:1280px; margin:0 auto; padding:0 20px 11px; display:flex; gap:16px; flex-wrap:wrap; font-family:"Geist Mono",monospace; font-size:12px; color:var(--muted); }
  .statsbar b { color:var(--ink); }
  .statsbar .stat-offer b { color:var(--green); }
  .statsbar .stat-due { color:var(--amber); }
  .statsbar:empty { display:none; }
  .spacer { flex:1; }

  .tabs { display:flex; gap:6px; }
  .tab { font-family:"Geist Mono",monospace; font-size:12px; letter-spacing:.08em; text-transform:uppercase; padding:7px 13px; border-radius:999px; border:1px solid var(--line); color:var(--muted); background:transparent; cursor:pointer; }
  .tab:hover { color:var(--ink); border-color:var(--faint); }
  .tab.on { background:var(--cobalt); border-color:var(--cobalt); color:#0b0c0e; font-weight:700; }
  .tab .n { opacity:.75; }

  .controls { max-width:1280px; margin:0 auto; padding:12px 20px 4px; display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  input[type=search], select { background:var(--card); border:1px solid var(--line); color:var(--ink); border-radius:10px; padding:8px 12px; font-family:"Mona Sans",sans-serif; font-size:14px; outline:none; }
  input[type=search] { width:260px; }
  input[type=search]:focus, select:focus { border-color:var(--cobalt); }
  .chip { font-family:"Geist Mono",monospace; font-size:11.5px; letter-spacing:.06em; padding:6px 11px; border-radius:999px; border:1px solid var(--line); color:var(--muted); background:transparent; cursor:pointer; }
  .chip.on { border-color:var(--cobalt); color:var(--cobalt-deep); background:rgba(111,136,207,.12); }
  /* action toolbar — same pill shape as the filter chips; left-aligned so it
     lines up cleanly under the search box (no orphaned right-float) */
  .util { display:flex; gap:6px; flex-wrap:wrap; align-items:center; flex-basis:100%; margin-top:2px; }
  .util button { background:transparent; border:1px solid var(--line); color:var(--muted); border-radius:999px; padding:7px 12px; font-family:"Geist Mono",monospace; font-size:11.5px; letter-spacing:.06em; cursor:pointer; }
  .util button:hover { color:var(--ink); border-color:var(--faint); }
  #sync.on { color:var(--green); border-color:rgba(127,191,142,.5); }

  main { max-width:1280px; margin:0 auto; padding:10px 20px 80px; }
  .day { font-family:"Geist Mono",monospace; font-size:11.5px; color:var(--faint); text-transform:uppercase; letter-spacing:.16em; margin:22px 0 8px; display:flex; align-items:center; gap:10px; }
  .day::after { content:""; flex:1; height:1px; background:var(--line); }

  .row { display:grid; grid-template-columns: 1fr auto; gap:4px 16px; padding:12px 16px; border:1px solid var(--line); border-radius:14px; background:var(--card); margin-bottom:8px; align-items:center; }
  .row:hover { border-color:#2e333a; }
  .row.applied-row { opacity:.85; }
  .r-main { min-width:0; }
  .r-title { font-weight:700; font-size:15.5px; letter-spacing:-.01em; }
  .r-title a { color:var(--ink); }
  .r-title a:hover { color:var(--cobalt-deep); text-decoration:none; }
  .r-sub { margin-top:3px; font-size:13px; color:var(--muted); display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  .badge { font-family:"Geist Mono",monospace; font-size:10.5px; letter-spacing:.08em; text-transform:uppercase; padding:2px 8px; border-radius:999px; border:1px solid var(--line); color:var(--faint); }
  .badge.new { border-color:rgba(127,191,142,.5); color:var(--green); }
  .badge.tgt { border-color:rgba(217,179,106,.5); color:var(--amber); }
  .badge.cat { color:var(--cobalt-deep); border-color:rgba(111,136,207,.4); }
  .badge.term { color:var(--muted); border-color:var(--line); }
  .badge.hot { color:#ff8a5c; border-color:rgba(255,138,92,.55); background:rgba(255,138,92,.1); font-weight:700; }
  .badge.fit-s { color:#e5c06a; border-color:rgba(229,192,106,.5); }
  .badge.fit-g { color:var(--muted); border-color:var(--line); }
  .row.hot-row { border-color:rgba(255,138,92,.32); }
  .chip.hot.on { border-color:#ff8a5c; color:#ff8a5c; background:rgba(255,138,92,.12); }
  .r-actions { display:flex; gap:6px; align-items:center; }
  .act { border:1px solid var(--line); background:transparent; color:var(--muted); border-radius:9px; padding:7px 12px; font-size:13px; cursor:pointer; font-family:"Mona Sans",sans-serif; font-weight:600; white-space:nowrap; }
  .act:hover { color:var(--ink); border-color:var(--faint); }
  .act.primary { background:var(--cobalt); border-color:var(--cobalt); color:#0b0c0e; }
  .act.primary:hover { background:var(--cobalt-deep); color:#0b0c0e; }
  .act.star.on { color:var(--amber); border-color:rgba(217,179,106,.5); }
  .act.done { background:rgba(127,191,142,.15); border-color:rgba(127,191,142,.4); color:var(--green); }

  .st-select { background:var(--card2); border:1px solid var(--line); color:var(--ink); border-radius:8px; padding:6px 8px; font-size:13px; }
  .notes { width:100%; margin-top:8px; background:var(--card2); border:1px solid var(--line); border-radius:8px; color:var(--ink); padding:7px 10px; font-size:13px; font-family:"Mona Sans",sans-serif; display:none; }
  .row.open .notes { display:block; }

  .empty { text-align:center; color:var(--faint); padding:60px 0; font-size:14px; }
  .loading { text-align:center; color:var(--faint); padding:80px 0; font-family:"Geist Mono",monospace; font-size:12px; letter-spacing:.2em; text-transform:uppercase; }
  @media (max-width:720px) {
    .row { grid-template-columns:1fr; }
    .r-actions { justify-content:flex-end; }
    input[type=search] { width:100%; }
  }
</style>
</head>
<body>
<header>
  <div class="hrow">
    <div class="brand">CareerOS <span>Tracker</span><span style="color:var(--cobalt-deep)">.</span></div>
    <div class="meta" id="meta">loading…</div>
    <div class="spacer"></div>
    <nav class="tabs" id="tabs"></nav>
  </div>
  <div class="statsbar" id="stats"></div>
</header>

<div class="controls">
  <input type="search" id="q" placeholder="Search company or role…">
  <select id="cat"><option value="">All categories</option></select>
  <select id="lvl"><option value="">All levels</option><option value="intern">Intern</option><option value="new-grad">New grad</option><option value="full-time">Full-time</option></select>
  <select id="term"><option value="">All terms</option></select>
  <select id="sort"><option value="newest">Newest</option><option value="fit">Best fit</option><option value="followup">Follow-up due</option></select>
  <button class="chip" id="fFit">⭐ Strong fit</button>
  <button class="chip hot" id="fHot">🔥 Hot</button>
  <button class="chip" id="fNew">🆕 New</button>
  <button class="chip" id="fTgt">🎯 Targets</button>
  <div class="util">
    <button id="undo" title="Undo last change (Ctrl+Z)" disabled>↶ Undo</button>
    <button id="sync" title="Live-sync your tracked roles to a Google Sheet">⧉ Sheet</button>
    <button id="csv" title="Download your tracked roles as a spreadsheet (opens in Excel/Sheets)">⬇ CSV</button>
    <button id="exp" title="Back up all tracker data as JSON">Export</button>
    <button id="imp" title="Restore tracker data from a JSON backup">Import</button>
  </div>
</div>

<main id="list"><div class="loading">Fetching today's roles</div></main>

<script>
(() => {
  const DATA_URL = "https://raw.githubusercontent.com/leebwj/CareerOS/main/apps/role-grabber/data/roles.json";
  // "target" is computed by the grabber (relevant role at a desirable company) → r.target
  const LS = "careeros-tracker-v1";
  const STAGES = ["Applied", "OA / Screen", "Interview", "Offer", "Rejected", "Ghosted"];

  const LS_BAK = LS + "-lastgood";
  let roles = [], state = { s: {}, hidden: {} }, view = "inbox", fNew = false, fTgt = false, fHot = false, fFit = false;
  try { state = { s: {}, hidden: {}, ...JSON.parse(localStorage.getItem(LS) || "{}") } } catch {}
  // safety net: if the live tracker is empty but a backup holds tracked roles,
  // offer to restore (covers accidental wipes). Non-nagging: clears backup on decline.
  try {
    const bak = JSON.parse(localStorage.getItem(LS_BAK) || "{}");
    const nBak = Object.keys(bak.s || {}).length;
    if (!Object.keys(state.s || {}).length && nBak) {
      if (confirm(`CareerOS: found ${nBak} tracked role(s) from a local backup. Restore them?`)) {
        state = { s: {}, hidden: {}, ...bak };
        localStorage.setItem(LS, JSON.stringify(state));
      } else {
        localStorage.removeItem(LS_BAK);
      }
    }
  } catch {}
  const save = () => {
    state.updated = Date.now(); // for last-write-wins across devices
    localStorage.setItem(LS, JSON.stringify(state));
    if (Object.keys(state.s || {}).length) localStorage.setItem(LS_BAK, JSON.stringify(state)); // rolling backup of last non-empty state
    syncToSheet();
  };

  // ── Google Sheet live sync (via a user-deployed Apps Script web app) ──
  const SYNC_HEAD = ["Company", "Role", "Category", "Level", "Term", "Location", "Status", "Applied", "Follow-up", "Notes", "Fit", "URL"];
  let syncUrl = localStorage.getItem("careeros-sync-url") || "";
  let syncTimer, syncState = syncUrl ? "on" : "off";
  function trackedRows() {
    const byKey = {}; roles.forEach((r) => (byKey[key(r)] = r));
    return Object.entries(state.s).map(([k, s]) => {
      const r = byKey[k] || {}; const [company, title, loc] = k.split("|");
      return [r.company || company, r.title || title, r.category || "", r.level || "", r.term || "",
        (r.locations && r.locations[0]) || loc || "", s.st || (s.star ? "Starred" : ""),
        s.date || "", s.fu || "", s.notes || "", r.fit ?? "", r.url || s.url || ""];
    });
  }
  function setSyncBtn() {
    const b = document.getElementById("sync"); if (!b) return;
    b.classList.toggle("on", syncState === "on" || syncState === "synced" || syncState === "syncing");
    b.textContent = syncState === "synced" ? "⧉ Synced ✓" : syncState === "syncing" ? "⧉ Syncing…" : syncState === "error" ? "⧉ Sync ✕" : "⧉ Sheet";
  }
  function syncToSheet() {
    if (!syncUrl) return;
    clearTimeout(syncTimer);
    syncState = "syncing"; setSyncBtn();
    syncTimer = setTimeout(() => {
      // form-encoded = the transport Apps Script reliably preserves through its
      // 302 redirect (text/plain bodies can get dropped). no-cors, fire-and-forget.
      // push the FULL state (for cross-device load) + readable rows (for the sheet)
      fetch(syncUrl, { method: "POST", mode: "no-cors", headers: { "Content-Type": "application/x-www-form-urlencoded" }, body: "payload=" + encodeURIComponent(JSON.stringify({ state: JSON.stringify(state), rows: trackedRows() })) })
        .then(() => { syncState = "synced"; setSyncBtn(); })
        .catch(() => { syncState = "error"; setSyncBtn(); });
    }, 1500);
  }
  // pull state from the sheet (JSONP — bypasses CORS on Apps Script GET); adopt
  // it only if it's NEWER than what we have and non-empty (never wipes local).
  function pullFromSheet() {
    if (!syncUrl) return;
    const fn = "__cos_" + Date.now() + "_" + Math.floor(Math.random() * 1e6);
    const s = document.createElement("script");
    const done = () => { try { delete window[fn]; } catch {} if (s.parentNode) s.parentNode.removeChild(s); };
    const timer = setTimeout(done, 9000);
    window[fn] = (payload) => {
      clearTimeout(timer); done();
      try {
        const remote = payload && payload.state ? JSON.parse(payload.state) : null;
        if (remote && Object.keys(remote.s || {}).length && (remote.updated || 0) > (state.updated || 0)) {
          state = { s: {}, hidden: {}, ...remote };
          localStorage.setItem(LS, JSON.stringify(state));
          if (Object.keys(state.s || {}).length) localStorage.setItem(LS_BAK, JSON.stringify(state));
          render();
        }
      } catch {}
    };
    s.src = syncUrl + (syncUrl.includes("?") ? "&" : "?") + "callback=" + fn;
    s.onerror = () => { clearTimeout(timer); done(); };
    document.head.appendChild(s);
  }

  // undo — snapshot state before each change so accidental actions revert.
  // Call pushUndo() at the top of every mutating handler.
  let undoStack = [];
  const pushUndo = () => { undoStack.push(JSON.stringify(state)); if (undoStack.length > 40) undoStack.shift(); syncUndo(); };
  const syncUndo = () => { const b = document.getElementById("undo"); if (b) b.disabled = undoStack.length === 0; };
  const doUndo = () => { if (!undoStack.length) return; state = JSON.parse(undoStack.pop()); save(); render(); syncUndo(); };
  const key = (r) => (r.company + "|" + r.title + "|" + (r.locations[0] || "")).toLowerCase().replace(/\s+/g, " ");
  const esc = (s) => String(s ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  // follow-up cadence (research: email 7-14 days after applying, max 2 attempts)
  const addBizDays = (iso, n) => {
    const d = new Date(iso + "T12:00:00");
    while (n > 0) { d.setDate(d.getDate() + 1); if (d.getDay() !== 0 && d.getDay() !== 6) n--; }
    return d.toISOString().slice(0, 10);
  };
  const today = () => new Date().toISOString().slice(0, 10);

  const TABS = [
    ["inbox", "Inbox"], ["starred", "Starred"], ["applied", "Tracker"], ["hidden", "Hidden"],
  ];

  function counts() {
    const applied = Object.keys(state.s).length;
    const starred = roles.filter((r) => state.s[key(r)]?.star && !state.s[key(r)]?.st).length;
    const hidden = Object.keys(state.hidden).length;
    const inbox = roles.filter((r) => !state.s[key(r)]?.st && !state.hidden[key(r)]).length;
    return { inbox, starred, applied: roles.filter((r) => state.s[key(r)]?.st).length + orphanCount(), hidden };
  }
  // applied roles that fell out of the feed (closed postings) still show in Tracker
  function orphanCount() {
    const live = new Set(roles.map(key));
    return Object.entries(state.s).filter(([k, v]) => v.st && !live.has(k)).length;
  }

  function tabs() {
    const c = counts();
    document.getElementById("tabs").innerHTML = TABS.map(([id, label]) =>
      `<button class="tab ${view === id ? "on" : ""}" data-v="${id}">${label} <span class="n">${c[id] ?? ""}</span></button>`).join("");
    document.querySelectorAll(".tab").forEach((b) => b.onclick = () => { view = b.dataset.v; render(); });
  }

  function rowHTML(r, k, st) {
    const isNew = r.isNew, isTgt = r.target, isHot = r.hot;
    const s = st || {};
    const stageSel = `<select class="st-select" data-k="${esc(k)}">` +
      `<option value="">— stage —</option>` +
      STAGES.map((x) => `<option ${s.st === x ? "selected" : ""}>${x}</option>`).join("") + `</select>`;
    return `<div class="row ${s.st ? "applied-row" : ""} ${isHot ? "hot-row" : ""}" data-k="${esc(k)}">
      <div class="r-main">
        <div class="r-title"><a href="${esc(r.url)}" target="_blank" rel="noopener">${esc(r.company)} — ${esc(r.title)}</a></div>
        <div class="r-sub">
          ${r.fit >= 0.6 ? '<span class="badge fit-s" title="Strong fit">⭐</span>' : r.fit >= 0.48 ? '<span class="badge fit-g" title="Good fit">◐</span>' : ""}
          ${isHot ? '<span class="badge hot">🔥 hot</span>' : ""}
          ${isNew ? '<span class="badge new">new</span>' : ""}
          ${isTgt ? '<span class="badge tgt">target</span>' : ""}
          <span class="badge cat">${esc(r.category)}</span>
          ${r.term ? `<span class="badge term">${esc(r.term)}</span>` : ""}
          <span>${esc(r.locations[0] || "")}</span>
          <span class="mono" style="font-size:12px;color:var(--faint)">${esc(r.posted)} · ${esc(r.level)}</span>
          ${s.date ? `<span class="mono" style="font-size:12px;color:var(--green)">applied ${s.date}</span>` : ""}
          ${s.fu && s.st === "Applied" ? `<span class="mono" style="font-size:12px;color:${s.fu <= today() ? "var(--red)" : "var(--amber)"}">${s.fu <= today() ? "⏰ follow up now" : "follow-up " + s.fu}${s.fuN > 1 ? " (#2)" : ""}</span>` : ""}
          ${s.fuDone ? `<span class="mono" style="font-size:12px;color:var(--faint)">followed up ×${s.fuDone} — consider closing if silent</span>` : ""}
        </div>
        <input class="notes" data-k="${esc(k)}" placeholder="notes — contact, referral, follow-up…" value="${esc(s.notes || "")}">
      </div>
      <div class="r-actions">
        ${view === "applied" || s.st ? stageSel : `<a class="act primary" href="${esc(r.url)}" target="_blank" rel="noopener">Apply ↗</a>`}
        ${s.fu && s.st === "Applied" && s.fu <= today() ? `<button class="act fu-done" data-k="${esc(k)}">✉ Followed up</button>` : ""}
        ${s.st ? "" : `<button class="act mark" data-k="${esc(k)}">✓ Applied</button>`}
        <button class="act star ${s.star ? "on" : ""}" data-k="${esc(k)}">★</button>
        <button class="act note-t" data-k="${esc(k)}">✎</button>
        ${view === "hidden" ? `<button class="act unhide" data-k="${esc(k)}">↩</button>` : s.st ? `<button class="act untrack" data-k="${esc(k)}" title="Remove from tracker">Untrack</button>` : `<button class="act hide" data-k="${esc(k)}">✕</button>`}
      </div>
    </div>`;
  }

  function renderStats() {
    const el = document.getElementById("stats"); if (!el) return;
    let applied = 0, prog = 0, offer = 0, week = 0, due = 0;
    const weekAgo = new Date(Date.now() - 7 * 864e5).toISOString().slice(0, 10);
    for (const v of Object.values(state.s)) {
      if (v.st) applied++;
      if (v.st === "OA / Screen" || v.st === "Interview") prog++;
      if (v.st === "Offer") offer++;
      if (v.date && v.date >= weekAgo) week++;
      if (v.fu && v.st === "Applied" && v.fu <= today()) due++;
    }
    el.innerHTML = applied === 0 ? "" :
      `<span><b>${applied}</b> applied</span><span><b>${prog}</b> in progress</span>` +
      (offer ? `<span class="stat-offer"><b>${offer}</b> offer${offer > 1 ? "s" : ""}</span>` : "") +
      `<span><b>${week}</b> this week</span>` +
      (due ? `<span class="stat-due">⏰ <b>${due}</b> follow-up${due > 1 ? "s" : ""} due</span>` : "");
  }
  function render() {
    tabs();
    renderStats();
    const q = document.getElementById("q").value.toLowerCase();
    const cat = document.getElementById("cat").value;
    const lvl = document.getElementById("lvl").value;
    const term = document.getElementById("term").value;
    document.getElementById("fFit").classList.toggle("on", fFit);
    document.getElementById("fHot").classList.toggle("on", fHot);
    document.getElementById("fNew").classList.toggle("on", fNew);
    document.getElementById("fTgt").classList.toggle("on", fTgt);

    let rows = roles.filter((r) => {
      const k = key(r), s = state.s[k];
      if (view === "inbox" && (s?.st || state.hidden[k])) return false;
      if (view === "starred" && !s?.star) return false;
      if (view === "applied" && !s?.st) return false;
      if (view === "hidden" && !state.hidden[k]) return false;
      if (q && !(r.company + " " + r.title).toLowerCase().includes(q)) return false;
      if (cat && r.category !== cat) return false;
      if (lvl && r.level !== lvl) return false;
      if (term === "__none__") { if (r.term) return false; }
      else if (term && !(r.term || "").split(" / ").includes(term)) return false;
      if (fHot && !r.hot) return false;
      if (fFit && !(r.fit >= 0.6)) return false;
      if (fNew && !r.isNew) return false;
      if (fTgt && !r.target) return false;
      return true;
    });

    // sort (default newest; Tracker view defaults to overdue follow-ups first)
    const sortBy = document.getElementById("sort").value;
    if (sortBy === "fit") rows.sort((a, b) => (b.fit || 0) - (a.fit || 0));
    else if (sortBy === "followup" || view === "applied") rows.sort((a, b) => (state.s[key(a)]?.fu || "9999").localeCompare(state.s[key(b)]?.fu || "9999"));

    // Tracker view keeps closed postings (fell out of the feed) visible
    let orphans = "";
    if (view === "applied") {
      const live = new Set(roles.map(key));
      orphans = Object.entries(state.s).filter(([k, v]) => v.st && !live.has(k)).map(([k, v]) => {
        const [company, title, loc] = k.split("|");
        return rowHTML({ company, title, locations: [loc], url: v.url || "#", category: "closed posting", posted: "", level: "", isNew: false }, k, v);
      }).join("");
    }

    const list = document.getElementById("list");
    if (!rows.length && !orphans) { list.innerHTML = `<div class="empty">Nothing here. ${view === "inbox" ? "All caught up 🎉" : ""}</div>`; return; }

    // group by posted date (inbox, newest sort) or flat (sorted) list
    let html = "";
    if (view === "inbox" && sortBy === "newest") {
      const groups = {};
      for (const r of rows) (groups[r.posted] ||= []).push(r);
      for (const d of Object.keys(groups).sort().reverse()) {
        html += `<div class="day">${d}${groups[d].some((r) => r.isNew) ? " · has new" : ""}</div>`;
        html += groups[d].map((r) => rowHTML(r, key(r), state.s[key(r)])).join("");
      }
    } else {
      html = rows.map((r) => rowHTML(r, key(r), state.s[key(r)])).join("") + orphans;
    }
    list.innerHTML = html;
    wire();
  }

  function wire() {
    document.querySelectorAll(".mark").forEach((b) => b.onclick = () => {
      pushUndo();
      const k = b.dataset.k;
      const r = roles.find((x) => key(x) === k);
      const d = today();
      state.s[k] = { ...(state.s[k] || {}), st: "Applied", date: d, url: r?.url, fu: addBizDays(d, 8), fuN: 1 };
      save(); render();
    });
    document.querySelectorAll(".fu-done").forEach((b) => b.onclick = () => {
      pushUndo();
      const k = b.dataset.k, s = state.s[k];
      s.fuDone = (s.fuDone || 0) + 1;
      if (s.fuDone >= 2) { delete s.fu; } // 2 attempts, then move on (research consensus)
      else { s.fu = addBizDays(today(), 5); s.fuN = 2; }
      save(); render();
    });
    document.querySelectorAll(".star").forEach((b) => b.onclick = () => {
      pushUndo();
      const k = b.dataset.k;
      state.s[k] = { ...(state.s[k] || {}), star: !state.s[k]?.star };
      if (!state.s[k].star && !state.s[k].st && !state.s[k].notes) delete state.s[k];
      save(); render();
    });
    document.querySelectorAll(".hide").forEach((b) => b.onclick = () => { pushUndo(); state.hidden[b.dataset.k] = 1; save(); render(); });
    document.querySelectorAll(".unhide").forEach((b) => b.onclick = () => { pushUndo(); delete state.hidden[b.dataset.k]; save(); render(); });
    // untrack: reset a role to untracked (accidental add / wrong click) — keeps a star/note if set
    document.querySelectorAll(".untrack").forEach((b) => b.onclick = () => {
      pushUndo();
      const k = b.dataset.k, s = state.s[k] || {};
      delete s.st; delete s.date; delete s.fu; delete s.fuN; delete s.fuDone;
      if (!s.star && !s.notes) delete state.s[k];
      save(); render();
    });
    document.querySelectorAll(".note-t").forEach((b) => b.onclick = () => b.closest(".row").classList.toggle("open"));
    document.querySelectorAll(".notes").forEach((n) => n.onchange = () => {
      pushUndo();
      state.s[n.dataset.k] = { ...(state.s[n.dataset.k] || {}), notes: n.value };
      save();
    });
    document.querySelectorAll(".st-select").forEach((s) => s.onchange = () => {
      pushUndo();
      const k = s.dataset.k;
      if (s.value) state.s[k] = { ...(state.s[k] || {}), st: s.value, date: state.s[k]?.date || new Date().toISOString().slice(0, 10) };
      else { delete state.s[k].st; if (!state.s[k].star && !state.s[k].notes) delete state.s[k]; }
      save(); render();
    });
  }

  // controls
  ["q", "cat", "lvl", "term", "sort"].forEach((id) => document.getElementById(id).addEventListener("input", render));
  // Undo is button-only — no global Ctrl+Z (a reflex Ctrl+Z must never wipe tracked roles)
  document.getElementById("undo").onclick = doUndo;
  document.getElementById("fFit").onclick = () => { fFit = !fFit; render(); };
  document.getElementById("fHot").onclick = () => { fHot = !fHot; render(); };
  document.getElementById("fNew").onclick = () => { fNew = !fNew; render(); };
  document.getElementById("fTgt").onclick = () => { fTgt = !fTgt; render(); };
  document.getElementById("exp").onclick = () => {
    const blob = new Blob([JSON.stringify(state, null, 1)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "careeros-tracker-backup.json";
    a.click();
  };
  // spreadsheet export — every tracked/starred role, joined with its feed data
  document.getElementById("csv").onclick = () => {
    const rows = trackedRows();
    if (!rows.length) { alert("Nothing tracked yet — mark some roles Applied or ★ first."); return; }
    const csv = [SYNC_HEAD, ...rows].map((row) => row.map((c) => `"${String(c).replace(/"/g, '""')}"`).join(",")).join("\r\n");
    const a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob(["﻿" + csv], { type: "text/csv;charset=utf-8" }));
    a.download = "careeros-applications.csv";
    a.click();
  };
  // JSONP connection test — confirms the deploy is reachable + doGet works
  function testConnection(cb) {
    if (!syncUrl) return cb(false);
    const fn = "__cost_" + Date.now() + "_" + Math.floor(Math.random() * 1e6);
    const s = document.createElement("script");
    const fin = (ok) => { try { delete window[fn]; } catch {} if (s.parentNode) s.parentNode.removeChild(s); cb(ok); };
    const timer = setTimeout(() => fin(false), 9000);
    window[fn] = (payload) => { clearTimeout(timer); fin(!!payload && typeof payload.state !== "undefined"); };
    s.src = syncUrl + (syncUrl.includes("?") ? "&" : "?") + "callback=" + fn;
    s.onerror = () => { clearTimeout(timer); fin(false); };
    document.head.appendChild(s);
  }
  document.getElementById("sync").onclick = () => {
    const u = prompt("Google Sheet sync — paste your Apps Script web-app URL (ends in /exec).\n\nSetup: click ⧉ then follow the SHEET_SYNC guide. Leave blank to turn OFF.", syncUrl);
    if (u === null) return;
    syncUrl = u.trim();
    localStorage.setItem("careeros-sync-url", syncUrl);
    if (!syncUrl) { syncState = "off"; setSyncBtn(); return; }
    syncState = "syncing"; setSyncBtn();
    testConnection((ok) => {
      if (ok) {
        alert("✓ Connected. Your tracked roles now sync to your sheet and load on any computer.");
        syncToSheet(); pullFromSheet();
        syncState = "synced"; setSyncBtn();
      } else {
        alert("✕ Couldn't reach your sheet.\n\nCheck the deployment:\n• 'Who has access' = Anyone\n• URL ends in /exec (not /dev)\n• the script includes the doGet function\n\nThen redeploy a New version and paste the URL again.");
        syncState = "error"; setSyncBtn();
      }
    });
  };
  setSyncBtn();
  document.getElementById("imp").onclick = () => {
    const inp = document.createElement("input");
    inp.type = "file"; inp.accept = ".json";
    inp.onchange = () => inp.files[0].text().then((t) => { state = { s: {}, hidden: {}, ...JSON.parse(t) }; save(); render(); });
    inp.click();
  };

  fetch(DATA_URL, { cache: "no-store" })
    .then((r) => r.json())
    .then((data) => {
      roles = data;
      const cats = [...new Set(roles.map((r) => r.category))].sort();
      document.getElementById("cat").innerHTML += cats.map((c) => `<option>${esc(c)}</option>`).join("");
      // terms, chronological (year then season); compound terms split apart
      const SEASON = { Spring: 0, Summer: 1, Fall: 2, Winter: 3 };
      const terms = [...new Set(roles.flatMap((r) => (r.term || "").split(" / ")).filter(Boolean))]
        .sort((a, b) => { const [sa, ya] = a.split(" "), [sb, yb] = b.split(" "); return (+ya - +yb) || (SEASON[sa] - SEASON[sb]); });
      document.getElementById("term").innerHTML += `<option value="__none__">No term listed</option>` + terms.map((t) => `<option>${esc(t)}</option>`).join("");
      const newest = roles.reduce((m, r) => (r.posted > m ? r.posted : m), "");
      document.getElementById("meta").textContent = `${roles.length} roles · data ${newest}`;
      render();
      pullFromSheet(); // adopt newer state from the sheet (cross-device)
    })
    .catch(() => { document.getElementById("list").innerHTML = `<div class="empty">Couldn't fetch roles.json — check connection.</div>`; });

  // re-pull when you return to the tab (picks up edits made on another device)
  let lastPull = 0;
  window.addEventListener("focus", () => { if (Date.now() - lastPull > 15000) { lastPull = Date.now(); pullFromSheet(); } });
})();
</script>
</body>
</html>
